included:
  - ios/AshVault/AshVault

opt_in_rules:
  - force_unwrapping

force_unwrapping:
  severity: error

line_length:
  warning: 200
  error: 320
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 900
  error: 1500

type_body_length:
  warning: 800
  error: 1400

function_body_length:
  warning: 100
  error: 300

identifier_name:
  min_length:
    warning: 1
    error: 1

reporter: xcode
